<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Page | VisiTrack-Student Enrollment</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style1.css')}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="vt-reg-wrapper">
                <div class="logo-section top-logo">
                    <img src="{{url_for('static', filename='images/Full.png')}}" alt="VisiTrack Logo">
                </div><br><br>
                <header class="vt-form-header">
                    <div class="vt-logo-container">
                        <h2> Student Enrollment</h2>
                    </div>
                    <a href="{{ url_for('home') }}" class="close-btn"><i class="fas fa-times"></i></a>
                    <div class="vt-admin-info">Welcome, Mr. Sharma </div>
                </header>

                <form id="enrollmentForm" class="vt-three-column-grid" action="#" method="POST">
                    
                    <div class="vt-form-col">
                        <div class="vt-col-header">Personal Information</div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-address-card"></i> Full Name *</label>
                            <input type="text" name="full_name" required placeholder="Full Name">
                        </div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-id-badge"></i> Father's Name *</label>
                            <input type="text" name="father_name" required placeholder="Father's Name">
                        </div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-cake-candles"></i> Date of Birth *</label>
                            <input type="date" name="dob" placeholder="Date of Birth" required>
                        </div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-mobile"></i> Mobile Number *</label>
                            <input type="tel" name="mobile" required placeholder="+91">
                        </div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-envelope"></i> Email Address *</label>
                            <input type="email" name="email" required placeholder="Email Address">
                        </div>
                    </div>

                    <div class="vt-form-col">
                        <div class="vt-col-header">Academic Details</div>
                        <div class="vt-field">
                            <label><i class="fa-brands fa-affiliatetheme"></i> Program</label>
                            <select name="program">
                                <option>Diploma</option>
                                <option>B.Tech</option>
                                <option>M.Tech</option>
                                <option>P.Hd</option>
                                <option>M. Com</option>
                                <option>B.Com</option>
                                <option>B.Farma</option>
                            </select>
                        </div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-code-branch"></i> Branch</label>
                            <select name="branch"> 
                                <option>Computer Science & Engg.</option>
                                <option>Computer Engg.</option>
                                <option>Mechanical Engg.</option>
                                <option>Civil Engg.</option>
                                <option>Electrical Engg.</option>
                                <option>Electronics Engg.</option>
                                <option>Ins. & Con. Engg.</option>
                                <option>Textile Engg.</option>
                            </select>
                        </div>
                        <div class="vt-field">
                            <label>Semester</label>
                            <select name="semester">
                                <option>1st Semester</option>
                                <option>2nd Semester</option>
                                <option>3rd Semester</option>
                                <option>4th Semester</option>
                                <option>5th Semester</option>
                                <option>6th Semester</option>
                                <option>7th Semester</option>
                                <option>8th Semester</option>
                                <option>9th Semester</option>
                                <option>10th Semester</option>
                            </select>
                        </div>
                        <div class="vt-field"> 
                            <label><i class="fa-solid fa-layer-group"></i> Section</label>
                            <select name="section">
                                <option>A</option>
                                <option>B</option>
                                <option>C</option>
                                <option>D</option>
                            </select>
                        </div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-0"></i> Roll Number *</label>
                            <input type="text" name="roll_no" placeholder="Roll No." required>
                        </div>
                    </div>

                    <div class="vt-form-col">
                        <div class="vt-col-header">System / Face Registration</div>
                        
                        <div class="vt-camera-box">
                            <video id="video" autoplay muted></video>
                            <canvas id="canvas" style="display:none;"></canvas>
                            <div id="capture-overlay">Not Captured Yet</div>
                        </div>

                        <div class="vt-camera-btns">
                            <button type="button" id="start-cam" class="vt-btn-sec">Start Camera</button>
                            <button type="button" id="snap" class="vt-btn-prim">Capture & Save Face</button>
                        </div>

                        <div class="vt-field vt-mt-20">
                            <label><i class="fa-solid fa-id-badge"></i> Student Username (Auto)</label>
                            <input type="text" name="username" readonly placeholder="Enter Username">
                        </div>
                        <div class="vt-field">
                            <label><i class="fa-solid fa-unlock"></i> Temporary Password</label>
                            <input type="text" name="temp_password" readonly>
                        </div>
                        
                        <label class="vt-checkbox">
                            <input type="checkbox" name="send_mail" checked> Send Credentials via Email
                        </label>
                    </div>

                    <div class="vt-full-width">
                        <button type="submit" class="vt-main-submit btn-send">Register Student</button>
                    </div>
                </form>
</div>
    
</body>
</html>
