<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance | VisiTrack</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style1.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ----------SIDEBAR SECTION----------------- -->
    <div class="sidebar">
        <div class="logo"></div>
        <ul class="menu">
            <li class="active">
                <a href="home_page.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fa-solid fa-clipboard-user"></i>
                    <span>View Analysis</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fa-brands fa-black-tie"></i>
                    <span>Track-Record</span>
                </a>
            </li>
            <li>
                <a href="mark_attendance.html">
                    <i class="fa-solid fa-camera"></i>
                    <span>Mark Attendance</span>
                </a>
            </li>
            <li>
                <a href="gallery.html">
                    <i class="fa-solid fa-image"></i>
                    <span>Gallery</span>
                </a>
            </li>
            <li class="setting">
                <a href="#">
                    <i class="fa-solid fa-gear"></i>
                    <span>Setting</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="at-container">
            <header class="at-header">
                <h1>VisiTrack | Mark Daily Attendance</h1>
                <p>Select class parameters and scan student face to mark presence.</p>
            </header>

            <div class="at-selection-panel">
                <div class="at-input-row">
                    <div class="at-input-group">
                        <label>Date</label>
                        <input type="date" value="Enter today's date">
                    </div>
                    <div class="at-input-group">
                        <label>Program</label>
                        <select>
                            <option>Diploma</option>
                            <option>B.Tech</option>
                            <option>M.Tech</option>
                            <option>P.Hd</option>
                            <option>M. Com</option>
                            <option>B.Com</option>
                            <option>B.Farma</option>
                        </select>
                    </div>
                    <div class="at-input-group">
                        <label>Branch</label>
                        <select>
                            <option>Computer Science & Engg.</option>
                            <option>Computer Engg.</option>
                            <option>Mechanical Engg.</option>
                            <option>Civil Engg.</option>
                            <option>Electrical Engg.</option>
                            <option>Electronics Engg.</option>
                            <option>Ins. & Con. Engg.</option>
                            <option>Textile Engg.</option>
                        </select>
                    </div>
                </div>
                <div class="at-input-row">
                    <div class="at-input-group">
                        <label>Semester</label>
                        <select>
                            <option>1st Semester</option>
                            <option>2nd Semester</option>
                            <option>3rd Semester</option>
                            <option>4th Semester</option>
                            <option>5th Semester</option>
                            <option>6th Semester</option>
                            <option>7th Semester</option>
                            <option>8th Semester</option>
                            <option>9th Semester</option>
                            <option>10th Semester</option>
                        </select>
                    </div>
                    <div class="at-input-group">
                        <label>Section</label>
                        <select>
                            <option>A</option>
                            <option>B</option>
                            <option>C</option>
                            <option>D</option>
                        </select>
                    </div>
                    <div class="at-input-group">
                        <label>Subject</label>
                        <input type="text" placeholder="e.g. CS101">
                    </div>
                </div>
            </div>

            <div class="at-camera-card">
                <div class="at-video-wrapper">
                    <div class="at-placeholder-overlay">Camera Feed Preview</div>
                    <div class="at-face-scanner-box"></div> </div>
                <button class="at-btn-mark">Mark Attendance Now</button>
            </div>

            <div class="at-result-box success">
                <div class="at-result-icon">✔</div>
                <div class="at-result-details">
                    <h3>Attendance Marked Successfully</h3>
                    <p><strong>Student:</strong> Rahul Yadav</p>
                    <p><strong>Roll No:</strong> 101</p>
                    <p><strong>Time:</strong> 10:15 AM</p>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
