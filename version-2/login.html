<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style1.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-body">
                <div class="logo-section top-logo">
                    <img src="{{ url_for('static', filename='images/Full.png') }}" alt="VisiTrack Logo">
                </div>
        <div class="login-box">
            <h2>User Login</h2>
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div style="padding: 10px; 
                                margin-bottom: 10px; 
                                border-radius: 5px; 
                                text-align: center; 
                                font-size: 0.9rem; 
                
                                ">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
                {% endwith %}
            <form action="/login" method="POST">
                <div class="input-group">
                    <i class="fa-solid fa-star"></i>
                    <input type="text" name="email" placeholder="T. Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <div class="options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">LOGIN</button>

                <div class="signup-footer">
                        No account?, Create one! <a href="signup.html">Sign Up</a>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>
