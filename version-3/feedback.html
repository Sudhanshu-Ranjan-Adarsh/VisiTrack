<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Help Us Improve</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style1.css')}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="feedback-page">

    <header class="fb-header">
        <div class="fb-container">
            <img src="{{url_for('static', filename='images/Full.png')}}" alt="Logo" class="fb-logo">
            <a href="{{ url_for('home') }}" class="fb-home-link"><i class="fas fa-times"></i></a>
        </div>
    </header>

    <main class="fb-wrapper">
        <div class="fb-card">
            <div class="fb-title">
                <h1>Share Your <span>Feedback</span></h1>
                <p>Your experience matters to us. Let us know how we're doing!</p>
            </div>

            <form action="#" class="fb-form">
                <div class="fb-row">
                    <div class="fb-input-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </div>
                    <div class="fb-input-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" placeholder="Enter Your Email ID" required>
                    </div>
                </div>

                <div class="fb-rating-section">
                    <label>How would you rate our service?</label>
                    <div class="stars">
                        <input type="radio" id="star5" name="rating" value="5"><label for="star5"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1"><i class="fas fa-star"></i></label>
                    </div>
                </div>

                <div class="fb-categories">
                    <label>What did you like the most?</label>
                    <div class="pill-group">
                        <input type="checkbox" id="ui" name="fav"><label for="ui">User Interface</label>
                        <input type="checkbox" id="speed" name="fav"><label for="speed">Speed</label>
                        <input type="checkbox" id="support" name="fav"><label for="support">Support</label>
                        <input type="checkbox" id="security" name="fav"><label for="security">Security</label>
                    </div>
                </div>

                <div class="fb-input-group">
                    <label><i class="fas fa-comment-alt"></i> Your Comments</label>
                    <textarea rows="5" placeholder="Tell us more about your experience..."></textarea>
                </div>

                <div class="fb-action">
                    <button type="submit" class="fb-submit-btn">Send Feedback <i class="fas fa-paper-plane"></i></button>
                </div>
            </form>
        </div>

        <div class="fb-footer-note">
            <p><i class="fas fa-lock"></i> All feedback is anonymous and strictly for internal improvement.</p>
        </div>
    </main>

</body>
</html>
