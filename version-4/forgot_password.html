<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | VisiTrack</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style1.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="login-body"> <div class="logo-section top-logo">
        <img src="{{ url_for('static', filename='images/Full.png') }}" alt="Logo">
    </div>
    <div class="login-box"> <h2>Reset Password</h2>
        <p style="text-align: center; color: #666; font-size: 0.8rem; margin-bottom: 20px;">
            Enter your TID to receive a reset OTP on your email.
        </p>
        
        <form action="/forgot_password" method="POST">
            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" name="tid" placeholder="Enter Your TID" required>
            </div>
            
            <button type="submit" class="login-btn">SEND OTP</button>
            
            <div class="signup-footer">
                Back to <a href="{{ url_for('login') }}">Login</a>
            </div>
        </form>
    </div>
</body>
</html>
